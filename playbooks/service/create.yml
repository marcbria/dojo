---
- name: Creates a service running playbooks service-folders > env > docker-compose > permissions.
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    hostName: "{{ host }}"
    serviceParam: "{{ service }}"
    fileCreation: "{{ ansible_date_time.iso8601 }}"
  vars_files:
    - ./configs/dojo.yml
    - ./configs/secret.yml
    - ./inventory/services/base-{{ hostName }}.yml
  tasks:
    - name: Include setAllVars to get all service variables
      include_tasks: ../setAllVars.yml
      vars:
        mode: service
        param: "{{ serviceParam }}"

    - name: Ensure proxy network exists
      community.docker.docker_network:
        name: "proxy"
        state: present

    # -------------------------------------------------------------------------
    # Certificado autofirmado (solo si selfsigned=true)
    # -------------------------------------------------------------------------
    - name: Generate self-signed certificate for Traefik (if selfsigned)
      block:
        - name: Ensure self-signed certificate directory exists
          file:
            path: "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned"
            state: directory
            owner: "{{ allVars.user.run }}"
            group: "{{ allVars.user.group }}"
            mode: 0755

        - name: Generate self-signed certificate (if not exists)
          command: >
            openssl req -x509 -nodes -days 365 -newkey rsa:2048
            -keyout "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned/key.pem"
            -out "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned/cert.pem"
            -subj "/CN={{ allVars.dojo.domain }}"
          args:
            creates: "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned/cert.pem"

        - name: Set correct ownership and permissions on certificate files
          file:
            path: "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned/{{ item }}"
            owner: "{{ allVars.user.run }}"
            group: "{{ allVars.user.group }}"
            mode: 0644
          loop:
            - key.pem
            - cert.pem

        - name: Force regenerate certificate if requested
          command: >
            openssl req -x509 -nodes -days 365 -newkey rsa:2048
            -keyout "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned/key.pem"
            -out "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/selfsigned/cert.pem"
            -subj "/CN={{ allVars.dojo.domain }}"
          when: force_regen | default(false) | bool
          notify: restart traefik

      when: allVars.app.certificate.selfsigned | default(false)

    # -------------------------------------------------------------------------
    # Archivo tls.yml (necesario para certificado autofirmado)
    # -------------------------------------------------------------------------
    - name: Create TLS configuration file for self-signed certificate
      copy:
        content: |
          tls:
            certificates:
              - certFile: /etc/traefik/selfsigned/cert.pem
                keyFile: /etc/traefik/selfsigned/key.pem
        dest: "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/providers/tls.yml"
        owner: "{{ allVars.user.run }}"
        group: "{{ allVars.user.group }}"
        mode: 0644
      when: allVars.app.certificate.selfsigned | default(false)

    # -------------------------------------------------------------------------
    # Archivo dashboard.yml (configuración estática del router del dashboard)
    # Se genera siempre, con contenido adaptado al modo (selfsigned o LE)
    # -------------------------------------------------------------------------
    - name: Create dashboard configuration file for Traefik
      copy:
        content: |
          http:
            routers:
              traefik-dashboard:
                rule: "Host(`{{ allVars.dojo.domain }}`)"
                service: "api@internal"
                entryPoints:
                  - websecure
                middlewares:
                  - traefik-auth
                {% if allVars.app.certificate.selfsigned | default(false) %}
                tls: {}
                {% else %}
                tls:
                  certResolver: leresolver
                {% endif %}
            middlewares:
              traefik-auth:
                basicAuth:
                  users:
                    - "{{ allVars.app.credentials.username }}:{{ allVars.app.credentials.password }}"
        dest: "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/providers/dashboard.yml"
        owner: "{{ allVars.user.run }}"
        group: "{{ allVars.user.group }}"
        mode: 0644
      when: allVars.app.credentials is defined and allVars.app.credentials

    # -------------------------------------------------------------------------
    # Asegurar permisos de acme.json (solo para modo LE, pero harmless si no existe)
    # -------------------------------------------------------------------------
    - name: Ensure acme.json has correct permissions for Traefik
      file:
        path: "{{ allVars.path.base.services }}/{{ allVars.dojo.id }}/volumes/config/certificates/acme/acme.json"
        state: touch
        owner: root
        group: root
        mode: 0600
      when: allVars.dojo.tool == 'traefik'

  handlers:
    - name: restart traefik
      include_tasks: "{{ servicePath }}/manage.yml"
      vars:
        host: "{{ hostName }}"
        service: "{{ serviceParam }}"
        command: "restart"

# -----------------------------------------------------------------------------
# Importación de los playbooks estándar de Dojo
# -----------------------------------------------------------------------------
- import_playbook: service-folders.yml
- import_playbook: env.yml
- import_playbook: docker-compose.yml
- import_playbook: permissions.yml
