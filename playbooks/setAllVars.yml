---
# INCLUDE - Set global "allVars" from inventory dictionaries.
#           Override order: dojoVars < baseHostVars < genericVars < hostVars
#
# Required vars (auto-detected if not passed explicitly):
#   - hostName:  target server name (must always be set by caller)
#   - mode:      "service" or "site"  [auto-detected from siteParam/serviceParam]
#   - param:     service or site name [auto-detected from siteParam/serviceParam]

- name: "INIT - Auto-detect mode and param if not provided"
  set_fact:
    mode:  "{{ mode  | default('service' if serviceParam is defined else 'site') }}"
    param: "{{ param | default(serviceParam | default(siteParam | default(''))) }}"

- name: "INIT - Resolve layerDir"
  set_fact:
    layerDir: "{{ inventory_dir }}/{{ 'services' if mode == 'service' else 'sites' }}"

- name: "INIT - Assert param is defined"
  assert:
    that: param != ''
    fail_msg: "setAllVars requires 'param'. Got empty string."

- block:
    - name: "LAYER 1 - Load dojoVars"
      include_vars:
        file: ./configs/dojo.yml
        name: dojoVars

    - name: "LAYER 2 - stat baseHostVars"
      stat:
        path: "{{ layerDir }}/base-{{ hostName }}.yml"
      register: stat_base

    - name: "LAYER 2 - Load baseHostVars"
      include_vars:
        file: "{{ layerDir }}/base-{{ hostName }}.yml"
        name: baseHostVars
      when: stat_base.stat.exists

    - name: "LAYER 3 - stat genericVars"
      stat:
        path: "{{ layerDir }}/{{ param }}.yml"
      register: stat_generic

    - name: "LAYER 3 - Load genericVars"
      include_vars:
        file: "{{ layerDir }}/{{ param }}.yml"
        name: genericVars
      when: stat_generic.stat.exists

    - name: "LAYER 4 - stat hostVars"
      stat:
        path: "{{ layerDir }}/{{ hostName }}/{{ param }}.yml"
      register: stat_host

    - name: "LAYER 4 - Load hostVars"
      include_vars:
        file: "{{ layerDir }}/{{ hostName }}/{{ param }}.yml"
        name: hostVars
      when: stat_host.stat.exists

  delegate_to: localhost
  become: false

- name: "Combine allVars"
  set_fact:
    allVars: >-
      {{ dojoVars | default({})
         | combine(baseHostVars | default({}),
                   genericVars  | default({}),
                   hostVars     | default({}),
                   recursive=True) }}

- name: "VALIDATE - Assert mandatory fields exist in allVars"
  assert:
    that:
      - allVars.dojo is defined
      - allVars.dojo.id is defined
      - allVars.dojo.tool is defined
    fail_msg: >-
      allVars is missing required fields (dojo.id or dojo.tool).
      Check: {{ layerDir }}/{{ hostName }}/{{ param }}.yml

- name: "SITE - Inject computed version vars into allVars"
  set_fact:
    allVars: >-
      {{ allVars | combine({
           'dojo': allVars.dojo | combine({
             'versionMajorMinor': allVars.dojo.versionFamily.split('_')[0]
                                  + '_'
                                  + allVars.dojo.versionFamily.split('_')[1],
             'versionMajor': allVars.dojo.versionFamily.split('_')[0]
           })
         }, recursive=True) }}
  when: mode == 'site' and allVars.dojo.versionFamily is defined
