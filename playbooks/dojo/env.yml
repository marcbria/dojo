i---
- name: Create PKP's env file from the site's diccionary vars
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    hostName: "{{ host }}"
    siteParam: "{{ site }}"
    fileCreation: "{{ ansible_date_time.iso8601 }}"
  vars_files:
    - ./configs/dojo.yml
    - ./configs/secret.yml
    - ./inventory/sites/base-{{ hostName }}.yml
  tasks:
    - include_tasks: ../setAllVars.yml
      vars:
        mode: site
        param: "{{ siteParam }}"

    - name: Generate .env file from template and dojo vars
      template:
        src: "./templates/{{ allVars.dojo.tool }}/env-{{ allVars.dojo.versionMajor }}.j2"
        dest: "{{ allVars.path.base.sites }}/{{ allVars.dojo.id }}/.env"
